<!DOCTYPE html>
<html>
<head>
    <title>TABLEX - Book Table</title>
</head>
<body>

<h2>Book Table</h2>

<form id="form">

<input type="text" id="user" placeholder="Your Name"><br><br>
<input type="number" id="table" placeholder="Table ID"><br><br>
<input type="number" id="people" placeholder="People"><br><br>
<input type="number" id="budget" placeholder="Budget"><br><br>

<button type="submit">Book</button>

</form>

<br>

<button onclick="pay()">Simulate Payment</button>

<h3 id="result"></h3>

<script>

// store booking ID globally
let bookingID = null

// handle booking
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault()

    fetch("http://localhost:8080/book", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            UserName: document.getElementById("user").value,
            TableID: parseInt(document.getElementById("table").value),
            People: parseInt(document.getElementById("people").value),
            Budget: parseInt(document.getElementById("budget").value)
        })
    })
    .then(res => res.json())
    .then(data => {

        // store booking ID from backend
        bookingID = data.ID

        document.getElementById("result").innerHTML =
        "Booking created. Status: " + data.Status + " | Booking ID: " + bookingID
    })
})

// handle payment
function pay() {

    if (bookingID === null) {
        document.getElementById("result").innerHTML = "Please book first"
        return
    }

    fetch("http://localhost:8080/pay", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            TableID: parseInt(document.getElementById("table").value),
            BookingID: bookingID
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
        "Payment success: " + data.success + " | Booking Confirmed"
    })
}

</script>

</body>
</html>
